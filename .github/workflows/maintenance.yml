name: Maintenance

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for outdated packages
        id: outdated
        run: |
          npm outdated --json > outdated.json || true
          if [ -s outdated.json ]; then
            echo "OUTDATED=true" >> $GITHUB_OUTPUT
            cat outdated.json
          else
            echo "OUTDATED=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create PR for updates
        if: steps.outdated.outputs.OUTDATED == 'true'
        run: |
          npm update
          git checkout -b chore/update-dependencies-$(date +%Y%m%d)
          git add package.json package-lock.json
          git commit -m "chore: update dependencies"
          git push -u origin chore/update-dependencies-$(date +%Y%m%d)
          gh pr create --title "Update dependencies" --body "Automated dependency update" || true

  backup-repo:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Create backup
        run: |
          tar -czf backup.tar.gz .git
          echo "Backup created: backup.tar.gz"
      
      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: repo-backup
          path: backup.tar.gz
          retention-days: 7

  health-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build check
        run: npm run build
      
      - name: Verify CLI
        run: |
          node dist/cli/task.js list || echo "CLI test completed"
